{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h3 class="mb-3 fw-bold">📷 Scanner QR Code Tiket</h3>
            <p class="text-muted">Arahkan QR Code dari aplikasi pendaki ke depan kamera webcam Anda.</p>
            
            <div class="card shadow-sm border-0 mb-4 overflow-hidden">
                <div id="reader" style="width: 100%; min-height: 350px; background: #000;"></div>
            </div>

            <div id="scanResult" class="alert d-none" role="alert"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script>
    // Inisialisasi Scanner ketika halaman selesai dimuat
    function onScanSuccess(decodedText, decodedResult) {
        // Teks QR Code yang berhasil discan (Contoh: "TICKET-XXXXXX")
        console.log(`Code matched = ${decodedText}`, decodedResult);
        
        // Hentikan scan sementara waktu agar tidak menembak API berkali-kali
        html5QrcodeScanner.clear();

        // Tampilkan loading di komponen alert
        const resultDiv = document.getElementById('scanResult');
        resultDiv.className = "alert alert-info";
        resultDiv.classList.remove('d-none');
        resultDiv.innerText = "Sedang memverifikasi tiket...";

// Kirim kode QR ke API backend Flask
        fetch('/api/basecamp/verify-ticket', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ qr_code: decodedText })
        })
        .then(response => response.json().then(data => ({ status: response.status, body: data })))
        .then(res => {
            if (res.status === 200) {
                resultDiv.className = "alert alert-success";
                resultDiv.innerHTML = `
                    <strong>✓ Verifikasi Berhasil!</strong><br>
                    Nama: ${res.body.data.nama_pendaki}<br>
                    Tanggal: ${res.body.data.tanggal_mendaki}
                `;
            } else {
                resultDiv.className = "alert alert-danger";
                resultDiv.innerHTML = `<strong>⚠️ Gagal:</strong> ${res.body.message}`;
            }
            
            // Nyalakan kembali scanner setelah jeda 3 detik untuk scan tiket berikutnya
            setTimeout(() => {
                startScanner();
            }, 3000);
        })
        .catch(error => {
            console.error("Error:", error);
            resultDiv.className = "alert alert-danger";
            resultDiv.innerText = "Terjadi kesalahan koneksi sistem.";
            
            setTimeout(() => {
                startScanner();
            }, 3000);
        });
    }

    function onScanFailure(error) {
        // Abaikan error scanning real-time jika kamera gagal fokus membaca baris kode
    }

    let html5QrcodeScanner;
    function startScanner() {
        html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { fps: 10, qrbox: { width: 250, height: 250 } },
            /* verbose= */ false
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    // Mulai jalankan kamera
    window.onload = startScanner;
</script>
{% endblock %}
