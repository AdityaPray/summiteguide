<!DOCTYPE html>
<html lang="id">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login | Summit Guide</title>
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
        <h3 class="text-center mb-4">Login Summit Guide</h3>
        <form action="/login" method="POST">
            <div class="mb-3"><label>Email</label><input type="email" name="email" class="form-control" required></div>
            <div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control"
                    required></div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
        </form>

        <script src="https://accounts.google.com/gsi/client" async defer></script>
        <div id="g_id_onload" data-client_id="886718944338-84i2evu6l6t8kn71pot55omjqb53nmv7.apps.googleusercontent.com"
            data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard" data-width="360"></div>

        <script>
            window.onload = function () {
                google.accounts.id.cancel();
            }
            function handleCredentialResponse(response) {
                fetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: response.credential })
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.token) {
                            window.location.href = '/dashboard';
                        } else {
                            alert("Gagal Login: " + data.message);
                        }
                    })
                    .catch(err => console.error("Error:", err));
            }
        </script>
        <p class="text-center mt-3">Belum punya akun? <a href="/register">Daftar sekarang</a></p>
    </div>
</body>

</html>
