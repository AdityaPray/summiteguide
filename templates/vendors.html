{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Verifikasi Vendor Rental</h3>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Nama Toko</th>
                    <th>Nama Pendaftar</th>
                    <th>Dokumen KTP</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                {% for vendor in vendors %}
                <tr>
                    <td class="align-middle fw-bold">{{ vendor.shop_name }}</td>
                    <td class="align-middle">{{ vendor.name }}</td>
                    <td class="align-middle">
                        <a href="{{ vendor.ktp_image }}" target="_blank" class="btn btn-sm btn-outline-info">
                            📄 Lihat KTP
                        </a>
                    </td>
                    <td class="align-middle">
                        <button onclick="approveVendor('{{ vendor.id }}')" class="btn btn-sm btn-success">
                            ✓ Aktifkan Akun
                        </button>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="text-center py-4 text-muted">Tidak ada vendor yang menunggu verifikasi saat ini.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
async function approveVendor(userId) {
    if(confirm('Aktifkan vendor ini agar bisa mulai menyewakan alat?')) {
        try {
            const response = await fetch(`/admin/vendors/verify/${userId}`, { method: 'POST' });
            const result = await response.json();
            if(response.ok) {
                alert(result.message);
                location.reload(); 
            } else {
                alert('Gagal: ' + result.message);
            }
        } catch (error) {
            console.error('Error:', error);
        }
    }
}
</script>
{% endblock %}
